<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人工作管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css?v=2026031705">
    <link rel="stylesheet" href="https://unpkg.com/github-markdown-css@5.5.1/github-markdown.css">
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/styles/github.min.css">
    <script src="https://unpkg.com/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
</head>

<body class="h-screen w-screen overflow-hidden bg-gray-50 text-gray-900">
    <div class="h-full w-full flex">
        <aside id="sidebar-notes" class="w-80 bg-gray-900 text-white flex flex-col border-r border-gray-800">
            <div class="h-16 px-5 flex items-center justify-between border-b border-gray-800">
                <div class="flex items-center gap-2">
                    <i class="fas fa-book-open text-indigo-400"></i>
                    <div id="sidebar-title" class="font-semibold tracking-wide">个人工作管理</div>
                </div>
                <button id="notes-refresh" class="text-gray-300 hover:text-white" title="刷新">
                    <i class="fas fa-rotate-right"></i>
                </button>
            </div>

            <div id="sidebar-nav" class="p-3 border-b border-gray-800 space-y-2">
                <button id="nav-item-notes"
                    class="w-full flex items-center gap-2 px-3 py-2 rounded-md text-sm bg-gray-800 text-white">
                    <i class="fas fa-book-open text-indigo-400"></i>
                    <span class="flex-1 text-left">移动端知识总结</span>
                    <i class="fas fa-chevron-down opacity-70"></i>
                </button>
                <button id="nav-item-tasks"
                    class="w-full flex items-center gap-2 px-3 py-2 rounded-md text-sm text-gray-300 hover:text-white hover:bg-gray-800">
                    <i class="fas fa-list-check text-emerald-400"></i>
                    <span class="flex-1 text-left">任务管理</span>
                    <i class="fas fa-chevron-right opacity-50"></i>
                </button>
            </div>

            <div id="notes-sidebar" class="p-4 border-b border-gray-800">
                <div class="relative">
                    <i
                        class="fas fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input id="notes-search" type="text" placeholder="搜索文档"
                        class="w-full pl-9 pr-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm text-gray-100 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>

            <div id="notes-sidebar-list" class="flex-1 overflow-auto">
                <ul id="notes-list" class="p-3 space-y-1"></ul>
            </div>

            <div id="tasks-sidebar" class="hidden flex-1 overflow-auto">
                <div class="p-4 border-b border-gray-800 space-y-3">
                    <div class="text-xs font-semibold text-gray-400">筛选</div>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="tasks-filter-status"
                            class="w-full rounded-lg bg-gray-800 border border-gray-700 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="all">全部状态</option>
                            <option value="todo">待办</option>
                            <option value="doing">进行中</option>
                            <option value="done">已完成</option>
                        </select>
                        <select id="tasks-filter-priority"
                            class="w-full rounded-lg bg-gray-800 border border-gray-700 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="all">全部优先级</option>
                            <option value="P1">P1</option>
                            <option value="P2">P2</option>
                            <option value="P3">P3</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">排序</label>
                        <select id="tasks-sort"
                            class="w-full rounded-lg bg-gray-800 border border-gray-700 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="updated_desc">最近更新优先</option>
                            <option value="due_asc">截止日期优先</option>
                            <option value="priority">优先级P1→P3</option>
                        </select>
                    </div>
                    <button id="tasks-sidebar-refresh"
                        class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm text-gray-100 hover:bg-gray-700 transition">
                        刷新任务
                    </button>
                </div>
                <div class="p-4 text-xs text-gray-400">
                    <div id="tasks-sidebar-stats">任务统计：—</div>
                </div>
            </div>
        </aside>

        <main class="flex-1 min-w-0 flex flex-col">
            <div class="h-16 px-6 flex items-center justify-between bg-white border-b border-gray-200">
                <div class="min-w-0">
                    <div id="note-title" class="text-lg font-semibold truncate">请选择左侧文档</div>
                    <div id="note-subtitle" class="text-xs text-gray-500 truncate"></div>
                </div>
                <div id="top-mode-group" class="flex items-center gap-2 hidden">
                    <div class="inline-flex rounded-lg bg-gray-100 p-1">
                        <button id="mode-notes-btn"
                            class="px-3 py-1.5 rounded-md text-sm font-medium bg-white text-gray-900 shadow-sm">移动端知识总结</button>
                        <button id="mode-tasks-btn"
                            class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900">任务管理</button>
                    </div>
                    <button id="note-open-source"
                        class="hidden px-3 py-2 rounded-md text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                        打开源文件
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto p-6">
                <div id="notes-view" class="max-w-4xl mx-auto">
                    <div id="note-content"
                        class="markdown-body bg-white border border-gray-100 rounded-xl shadow-sm p-6">
                        <div class="text-sm text-gray-500">正在加载文档列表...</div>
                    </div>
                </div>

                <div id="interview-view" class="hidden max-w-4xl mx-auto">
                    <div class="bg-white border border-gray-100 rounded-xl shadow-sm p-6">
                        <div class="flex flex-col gap-4">
                            <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                                <div class="flex-1">
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">题库来源</label>
                                    <select id="interview-doc-select"
                                        class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                                    </select>
                                </div>
                                <div class="flex items-end gap-3">
                                    <label class="inline-flex items-center gap-2 text-sm text-gray-700 select-none">
                                        <input id="interview-shuffle" type="checkbox"
                                            class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                                        随机
                                    </label>
                                    <button id="interview-start"
                                        class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition">
                                        开始练习
                                    </button>
                                </div>
                            </div>

                            <div class="flex items-center justify-between">
                                <div id="interview-progress" class="text-sm text-gray-600"></div>
                                <div class="flex items-center gap-2">
                                    <button id="interview-reset"
                                        class="px-3 py-2 rounded-md text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                                        清空进度
                                    </button>
                                </div>
                            </div>

                            <div class="border border-gray-200 rounded-xl p-5">
                                <div class="text-xs font-semibold text-gray-500 mb-2">问题</div>
                                <div id="interview-question" class="text-lg font-semibold text-gray-900 leading-7">
                                </div>

                                <div class="mt-5">
                                    <div class="flex items-center justify-between mb-2">
                                        <div class="text-xs font-semibold text-gray-500">答案</div>
                                        <button id="interview-toggle-answer"
                                            class="px-3 py-1.5 rounded-md text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                                            显示答案
                                        </button>
                                    </div>
                                    <div id="interview-answer"
                                        class="markdown-body hidden bg-gray-50 border border-gray-100 rounded-lg p-4">
                                    </div>
                                </div>

                                <div class="mt-5 flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between">
                                    <div class="flex items-center gap-2">
                                        <button id="interview-know"
                                            class="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700 transition">
                                            我会了
                                        </button>
                                        <button id="interview-dont-know"
                                            class="px-4 py-2 rounded-lg bg-rose-600 text-white text-sm font-semibold hover:bg-rose-700 transition">
                                            不太会
                                        </button>
                                    </div>
                                    <button id="interview-next"
                                        class="px-4 py-2 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-black transition">
                                        下一题
                                    </button>
                                </div>
                            </div>

                            <div class="text-xs text-gray-500">
                                快捷键：空格 显示/隐藏答案；→ 下一题
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tasks-view" class="hidden max-w-5xl mx-auto">
                    <div class="bg-white border border-gray-100 rounded-xl shadow-sm p-6 space-y-6">
                        <div class="border border-gray-200 rounded-xl">
                            <div class="px-4 py-2 border-b border-gray-200 flex items-center justify-between">
                                <div class="text-sm font-semibold text-gray-700">任务列表</div>
                                <button id="task-modal-open"
                                    class="px-3 py-1.5 rounded-md text-sm bg-indigo-600 text-white hover:bg-indigo-700">新建任务</button>
                            </div>
                            <div id="tasks-list" class="divide-y divide-gray-100"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="task-modal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black/50" id="task-modal-overlay"></div>
        <div class="relative mx-auto my-10 w-[92%] max-w-2xl">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="px-5 py-3 flex items-center justify-between border-b border-gray-200">
                    <div class="font-semibold text-gray-800">新建任务</div>
                    <button id="task-modal-close" class="text-gray-500 hover:text-gray-700" title="关闭">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div class="p-5 grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-7">
                        <label class="block text-xs font-semibold text-gray-500 mb-1">标题</label>
                        <input id="task-title" type="text"
                            class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                            placeholder="例如：完善启动优化方案">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 mb-1">优先级</label>
                        <select id="task-priority"
                            class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                            <option value="P1">P1</option>
                            <option value="P2" selected>P2</option>
                            <option value="P3">P3</option>
                        </select>
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-xs font-semibold text-gray-500 mb-1">截止日期</label>
                        <input id="task-due" type="date"
                            class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                    </div>
                    <div class="md:col-span-12">
                        <label class="block text-xs font-semibold text-gray-500 mb-1">标签（逗号分隔，可选）</label>
                        <input id="task-tags" type="text"
                            class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                            placeholder="例如：规划, 优化, 启动">
                    </div>
                    <div class="md:col-span-12">
                        <label class="block text-xs font-semibold text-gray-500 mb-1">计划</label>
                        <textarea id="task-plan" rows="10"
                            class="w-full h-52 border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                            placeholder="拆解关键步骤或验收标准（支持多级列表）"></textarea>
                    </div>
                </div>
                <div class="px-5 py-3 border-t border-gray-200 flex items-center justify-end gap-2">
                    <button id="task-modal-cancel"
                        class="px-3 py-2 rounded-md text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">取消</button>
                    <button id="task-add"
                        class="px-4 py-2 rounded-md bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700">保存任务</button>
                </div>
            </div>
        </div>
    </div>

    <div id="task-detail-modal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black/50" id="task-detail-overlay"></div>
        <div class="relative mx-auto my-10 w-[92%] max-w-3xl">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="px-5 py-3 flex items-center justify-between border-b border-gray-200">
                    <div class="min-w-0">
                        <div id="task-detail-title" class="font-semibold text-gray-800 truncate">任务详情</div>
                        <div id="task-detail-meta" class="text-xs text-gray-500 truncate"></div>
                    </div>
                    <button id="task-detail-close" class="text-gray-500 hover:text-gray-700" title="关闭">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div class="p-5 space-y-4">
                    <div id="task-detail-view" class="space-y-4">
                        <div>
                            <div class="text-xs font-semibold text-gray-500 mb-1">计划详情（多级展示）</div>
                            <div id="task-detail-plan-preview"
                                class="markdown-body border border-gray-200 bg-white rounded p-3"></div>
                        </div>
                    </div>
                    <div id="task-detail-edit" class="hidden grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div class="md:col-span-7">
                            <label class="block text-xs font-semibold text-gray-500 mb-1">标题</label>
                            <input id="task-detail-title-input" type="text"
                                class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-gray-500 mb-1">优先级</label>
                            <select id="task-detail-priority"
                                class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                                <option value="P1">P1</option>
                                <option value="P2">P2</option>
                                <option value="P3">P3</option>
                            </select>
                        </div>
                        <div class="md:col-span-3">
                            <label class="block text-xs font-semibold text-gray-500 mb-1">截止日期</label>
                            <input id="task-detail-due" type="date"
                                class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                        </div>
                        <div class="md:col-span-12">
                            <label class="block text-xs font-semibold text-gray-500 mb-1">标签（逗号分隔，可选）</label>
                            <input id="task-detail-tags" type="text"
                                class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                        </div>
                        <div class="md:col-span-12">
                            <label class="block text-xs font-semibold text-gray-500 mb-1">计划原文</label>
                            <textarea id="task-detail-plan" rows="14"
                                class="w-full h-72 border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm"></textarea>
                        </div>
                    </div>
                </div>
                <div class="px-5 py-3 border-t border-gray-200 flex items-center justify-end gap-2">
                    <button id="task-detail-edit-btn"
                        class="px-3 py-2 rounded-md text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">编辑</button>
                    <button id="task-detail-cancel-edit"
                        class="hidden px-3 py-2 rounded-md text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">取消</button>
                    <button id="task-detail-save-edit"
                        class="hidden px-4 py-2 rounded-md bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js?v=2026032605"></script>
</body>

</html>
